<html>
<head>
    <link rel="stylesheet" href="page1.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="bg-container d-flex justify-content-center align-items-center">
        <div class="card-bg p-3 text-center">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSb1MjzdkGDhb7k_miIgJalR2bgN5LyOar9d4pj8OYHsT7YPRI9pm1zQ3Oi&s=10" class="img-style" />
            <h1 class="heading-style">Baby...Think again...🥺💘</h1>
            <p>Please think...Why you are clicking speed🥺</p>

            <a href="yes_page.html" class="btn-style yes-btn">Yes</a>
            <button class="btn-style no-btn moving-btn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>

    <script>
        function moveButton() {
            var btn = document.querySelector(".no-btn");

            var maxX = window.innerWidth - btn.offsetWidth;
            var maxY = window.innerHeight - btn.offsetHeight;

            var x = Math.random() * maxX;
            var y = Math.random() * maxY;

            btn.style.position = "fixed";   // ⭐ important
            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }
    </script>
</body>
</html>
